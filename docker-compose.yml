version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: chicken_feces_db
      MYSQL_ROOT_PASSWORD: root_password_here # Change this in production
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ml-service:
    build: ./ml-service
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./ml-service/app/weights:/app/app/weights
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
      ml-service:
        condition: service_started
    environment:
      - PORT=3000
      - DATABASE_URL=mysql://root:root_password_here@db:3306/chicken_feces_db
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=your_production_secret_here
      - NODE_ENV=production
      - GEMINI_API_KEY=your_gemini_api_key_here
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mysql_data:
