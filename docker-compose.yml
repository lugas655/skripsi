version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: chicken_feces_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_here}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chicken_net

  ml-service:
    build: ./ml-service
    restart: always
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/app/weights:/app/app/weights
    networks:
      - chicken_net
    # Port 8000 exposed to host for Nginx reverse proxy

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_started
      ml-service:
        condition: service_started
    environment:
      - PORT=3000
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-root_password_here}@db:3306/chicken_feces_db
      - ML_SERVICE_URL=https://mlservice.sayadewe.my.id
      - JWT_SECRET=${JWT_SECRET:-your_production_secret_here}
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - chicken_net
    # Port 3000 exposed to host for Nginx reverse proxy

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://backends.sayadewe.my.id/api}
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - chicken_net

networks:
  chicken_net:
    driver: bridge

volumes:
  mysql_data:
